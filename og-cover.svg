<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" width="1200" height="1200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#061F4D"/>
      <stop offset="0.55" stop-color="#15287A"/>
      <stop offset="1" stop-color="#2F3CB0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="1200" fill="url(#bg)"/>

  <!-- content lives in the centre 1200x630 band (y 285..915) so a centred crop yields a clean 1.91:1 card -->
  <g transform="translate(0,285)">
    <!-- network motif, upper right -->
    <g stroke="#5868EA" stroke-width="2.4" stroke-linecap="round" opacity="0.5">
      <line x1="985" y1="70" x2="1055" y2="130"/>
      <line x1="1055" y1="130" x2="1135" y2="70"/>
      <line x1="1055" y1="130" x2="1015" y2="210"/>
      <line x1="1055" y1="130" x2="1135" y2="195"/>
    </g>
    <circle cx="985" cy="70" r="7" fill="#6CB1F2" opacity="0.85"/>
    <circle cx="1135" cy="70" r="7" fill="#6CB1F2" opacity="0.85"/>
    <circle cx="1015" cy="210" r="7" fill="#5868EA" opacity="0.85"/>
    <circle cx="1135" cy="195" r="7" fill="#5868EA" opacity="0.85"/>
    <circle cx="1055" cy="130" r="11" fill="#2ED3FF"/>

    <!-- brand mark + eyebrow -->
    <g transform="translate(88,44)">
      <rect width="50" height="50" rx="12" fill="#0A2E5C" stroke="#2ED3FF" stroke-width="1.5"/>
      <path d="M12 36V15l13 11 13-11v21" fill="none" stroke="#DCE9FF" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round"/>
      <circle cx="12" cy="36" r="3" fill="#6CB1F2"/><circle cx="12" cy="15" r="3" fill="#8FE3FF"/><circle cx="25" cy="26" r="3.5" fill="#2ED3FF"/><circle cx="38" cy="15" r="3" fill="#8FE3FF"/><circle cx="38" cy="36" r="3" fill="#6CB1F2"/>
    </g>
    <text x="156" y="76" font-family="Helvetica, Arial, sans-serif" font-size="20" letter-spacing="2" fill="#AFC0FF">UMASS CHAN · MASSACHUSETTS</text>

    <!-- headline -->
    <text x="86" y="228" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="74" fill="#FFFFFF">Medical Entrepreneurship</text>
    <text x="86" y="312" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="74" fill="#FFFFFF">&amp; <tspan font-style="italic" fill="#8FE3FF">Innovation</tspan></text>

    <!-- subtitle -->
    <text x="88" y="392" font-family="Helvetica, Arial, sans-serif" font-size="29" fill="#C9D6F5">A medical entrepreneurship community. Evenings with founders,</text>
    <text x="88" y="430" font-family="Helvetica, Arial, sans-serif" font-size="29" fill="#C9D6F5">investors, and operators across Boston and Worcester.</text>

    <!-- tag -->
    <rect x="88" y="470" width="172" height="42" rx="21" fill="#2ED3FF"/>
    <text x="174" y="497" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-weight="700" font-size="19" letter-spacing="1" fill="#052049">FALL 2026</text>
  </g>
</svg>
